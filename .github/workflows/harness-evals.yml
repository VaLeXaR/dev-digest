# Harness evals — selective, per-PR.
#
# Routes each changed artifact to just the evals that cover it (scripts/ci-detect.mjs):
#   .claude/skills/<name>/**  → evals/skills/<name>   (content tier, blocking)
#   .claude/agents/<name>.md  → evals/agents/<name>   (tool tier,    blocking)
#   CLAUDE.md / any agent / engine change → the workflow tier   (tool tier, non-blocking)
# A changed artifact with NO written evals is reported as SKIP, not a failure.
#
# Backend: OpenRouter (no Claude subscription on CI). Models are a knob, not code:
#   - skills (content tier)       → DeepSeek, called natively (no proxy) — cheap, and it passes.
#   - agents/workflow (tool tier)  → google/gemini-2.5-flash through the bundled LiteLLM proxy
#     (evals/proxy/). The proxy's wildcard route forwards ANY EVAL_MODEL slug to OpenRouter, so the
#     tool jobs work for both non-Anthropic (Gemini/DeepSeek) and anthropic/* models. Trade-off: the
#     tool-tier cases carry strict thresholds (e.g. 1.0) calibrated for a Claude judge, so a cheap
#     model red-flakes them over exact rule-name/path wording (see evals/INSIGHTS.md) — the real fix
#     is to relax/repair the cases, not the model. Switch EVAL_TOOLS_MODEL to anthropic/claude-haiku-4.5
#     for the calibrated model (still routed via the proxy).
# Override per-run via workflow_dispatch inputs, or repo-wide via Actions VARIABLES — NOT Secrets;
# the workflow reads vars.EVAL_SKILLS_MODEL / vars.EVAL_TOOLS_MODEL (a Secret of the same name is
# invisible to the vars.* context and is silently ignored). Nothing is surfaced in the app UI.

name: harness-evals

on:
  pull_request:
    paths:
      - "evals/**"
      - ".claude/**"
      - "CLAUDE.md"
  workflow_dispatch:
    inputs:
      skills_model:
        description: "Override EVAL_MODEL for the content (skills) tier — OpenRouter slug"
        required: false
        default: ""
      tools_model:
        description: "Override EVAL_MODEL for the tool (agents/workflow) tiers — OpenRouter slug"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: harness-evals-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: evals

jobs:
  # ── 1. Detect which suites this PR touches ──────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      agents: ${{ steps.detect.outputs.agents }}
      run_workflow: ${{ steps.detect.outputs.run_workflow }}
      skipped_skills: ${{ steps.detect.outputs.skipped_skills }}
      skipped_agents: ${{ steps.detect.outputs.skipped_agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff against the PR base
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck # fail fast before spending any tokens

      - name: Compute changed files
        working-directory: . # repo root — paths must be repo-relative for ci-detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run = full sweep: synthesize a touch of every eval case dir + CLAUDE.md.
            { for d in evals/skills/*/ evals/agents/*/; do [ -d "$d" ] && echo "${d}dispatch"; done; \
              echo "CLAUDE.md"; } > changed.txt
          else
            git fetch --no-tags origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > changed.txt
          fi
          echo "----- changed files -----"; cat changed.txt

      - name: Detect eval targets
        id: detect
        run: |
          export CHANGED_FILES="$(cat ../changed.txt)"
          node scripts/ci-detect.mjs

      - name: Note skipped artifacts (no evals)
        if: steps.detect.outputs.skipped_skills != '' || steps.detect.outputs.skipped_agents != ''
        run: |
          {
            echo "### Skipped — changed but no evals written"
            [ -n "${{ steps.detect.outputs.skipped_skills }}" ] && echo "- skills: \`${{ steps.detect.outputs.skipped_skills }}\`"
            [ -n "${{ steps.detect.outputs.skipped_agents }}" ] && echo "- agents: \`${{ steps.detect.outputs.skipped_agents }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Skills (content tier) — DeepSeek native, no proxy. BLOCKING. ─────────
  skills-evals:
    needs: detect
    if: needs.detect.outputs.skills != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJSON(needs.detect.outputs.skills) }}
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.skills_model || vars.EVAL_SKILLS_MODEL || 'deepseek/deepseek-chat' }}
      EVAL_JUDGE_MODEL: ${{ inputs.skills_model || vars.EVAL_SKILLS_MODEL || 'deepseek/deepseek-chat' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: eval skills/${{ matrix.skill }}
        # Trailing slash anchors the filter to this exact dir — a bare name is a substring
        # match that would also pull sibling dirs sharing the prefix (e.g. foo vs foo-lite).
        run: pnpm vitest run "skills/${{ matrix.skill }}/"

  # ── 3. Agents (tool tier) — Gemini Flash via LiteLLM proxy. BLOCKING. ───────
  agents-evals:
    needs: detect
    if: needs.detect.outputs.agents != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJSON(needs.detect.outputs.agents) }}
    env:
      EVAL_BACKEND: openrouter
      # Proxy on: the LiteLLM wildcard forwards ANY EVAL_MODEL slug (anthropic/* AND non-Anthropic
      # like Gemini/DeepSeek) to OpenRouter, so this job works regardless of which model the var/
      # default resolves to. Set EVAL_TOOLS_MODEL as an Actions VARIABLE (not a Secret) to override.
      OPENROUTER_BASE_URL: http://localhost:4000
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tools_model || vars.EVAL_TOOLS_MODEL || 'google/gemini-2.5-flash' }}
      EVAL_JUDGE_MODEL: ${{ inputs.tools_model || vars.EVAL_TOOLS_MODEL || 'google/gemini-2.5-flash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Start LiteLLM proxy
        run: docker compose -f proxy/docker-compose.yml up -d
      - run: pnpm proxy:wait
      - name: eval agents/${{ matrix.agent }}
        # Trailing slash anchors the filter to this exact dir (a bare name substring-matches
        # sibling dirs, e.g. architecture-reviewer vs architecture-reviewer-lite).
        # Sequential: keep concurrency low against OpenRouter.
        run: pnpm vitest run "agents/${{ matrix.agent }}/" --no-file-parallelism
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down

  # ── 4. Workflow tier — live harness. NON-BLOCKING (activation/dispatch flake). ─
  workflow-evals:
    needs: detect
    if: needs.detect.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true # reports, never blocks merge — activation/dispatch cases stay flaky
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_BASE_URL: http://localhost:4000 # proxy on — see agents-evals rationale
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tools_model || vars.EVAL_TOOLS_MODEL || 'google/gemini-2.5-flash' }}
      EVAL_JUDGE_MODEL: ${{ inputs.tools_model || vars.EVAL_TOOLS_MODEL || 'google/gemini-2.5-flash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Start LiteLLM proxy
        run: docker compose -f proxy/docker-compose.yml up -d
      - run: pnpm proxy:wait
      - run: pnpm vitest run workflow --no-file-parallelism
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down
